<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Faulhaber Design Ltd — Landscape Architecture &amp; Planning"/>
  <title>Faulhaber Design Ltd</title>
  <meta name="theme-color" content="#f5f5f5"/>

  <!-- Open Graph -->
  <meta property="og:title" content="Faulhaber Design Ltd"/>
  <meta property="og:description" content="Landscape Architecture &amp; Planning — Devon"/>
  <meta property="og:url" content="https://faulhaber.co.uk"/>
  <meta property="og:type" content="website"/>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 13px; -webkit-font-smoothing: antialiased; }

    body {
      background: #f5f5f5;
      color: #0a0a0a;
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    #scroll-driver { height: 300vh; width: 100%; pointer-events: none; }

    #logo-wrap {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 85vmin; height: 85vmin;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      z-index: 0;
    }

    #logo {
      width: 100%; height: 100%;
      opacity: 0.08;
      transform-origin: center center;
      transition: transform 0.05s linear, opacity 0.05s linear;
    }

    #contact {
      position: fixed;
      bottom: 2.5rem; left: 2.5rem;
      z-index: 10;
      line-height: 1.9;
      letter-spacing: 0.06em;
    }

    .company-name {
      font-weight: 400;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

  .rule {
    width: 100%;
    height: 1px;
    background: #0a0a0a;
    border: none;
    margin-bottom: 0.75rem;
    opacity: 0.3;
  }

    #contact a { display: block; color: inherit; text-decoration: none; font-size: 1rem; }
    #contact a:hover { text-decoration: underline; text-underline-offset: 3px; }

  @media (prefers-reduced-motion: reduce) {
    #logo { transition: none; }
  }
  </style>
</head>
<body>

  <!-- 300vh invisible scroll driver -->
  <div id="scroll-driver"></div>

  <!-- Fixed centred logo -->
  <div id="logo-wrap">
    <svg id="logo"
      viewBox="0 0 320 230"
      xmlns="http://www.w3.org/2000/svg"
      aria-label="Faulhaber Design — fd monogram"
      role="img">

      <!-- f character -->
      <!-- Stem -->
      <rect x="20" y="42" width="22" height="158" fill="#0a0a0a"/>
      <!-- Top curve -->
      <path d="M20 42 Q20 8 52 8 L72 8 L72 30 L52 30 Q42 30 42 42 Z" fill="#0a0a0a"/>
      <!-- Crossbar -->
      <rect x="20" y="88" width="62" height="18" fill="#0a0a0a"/>

      <!-- d — compound path: stem + bowl outer + circular counter, fill-rule=evenodd for true transparency -->
      <path fill-rule="evenodd" fill="#0a0a0a"
        d="M112 42 L134 42 L134 88
           Q134 58 164 58
           Q194 58 194 120
           Q194 182 164 182
           Q134 182 134 152
           L134 200 L112 200 Z
           M132 120 A36 36 0 1 0 204 120 A36 36 0 1 0 132 120 Z"/>

      <!-- Rule beneath -->
      <line x1="20" y1="215" x2="214" y2="215" stroke="#0a0a0a" stroke-width="1.2"/>
    </svg>
  </div>

  <!-- Fixed bottom-left contact block -->
  <div id="contact">
    <p class="company-name">Faulhaber Design Ltd</p>
    <hr class="rule" aria-hidden="true"/>
    <a href="tel:+441392861300">01392 861300</a>
    <a href="mailto:klaus@faulhaber.co.uk">klaus@faulhaber.co.uk</a>
  </div>

  <script>
    (function () {
      const logo = document.getElementById('logo');
      const motionOK = window.matchMedia('(prefers-reduced-motion: no-preference)').matches;
      function lerp(a, b, t) { return a + (b - a) * t; }
      function clamp(v, mn, mx) { return Math.min(Math.max(v, mn), mx); }
      function getOpacity(p) {
        if (p < 0.35) return lerp(0.08, 1.0, p / 0.35);
        if (p < 0.70) return lerp(1.0, 0.15, (p - 0.35) / 0.35);
        return lerp(0.15, 0.0, (p - 0.70) / 0.30);
      }
      function update() {
        logo.style.willChange = (window.scrollY > 0) ? 'transform, opacity' : 'auto';
        const max = document.documentElement.scrollHeight - window.innerHeight;
        if (max <= 0) return;
        if (!motionOK) return;
        const p = clamp(window.scrollY / max, 0, 1);
        logo.style.transform = `scale(${lerp(1.0, 2.8, p).toFixed(4)})`;
        logo.style.opacity = getOpacity(p).toFixed(4);
      }
      let rafPending = false;
      function scheduleUpdate() {
        if (!rafPending) {
          rafPending = true;
          requestAnimationFrame(function() { update(); rafPending = false; });
        }
      }
      window.addEventListener('scroll', scheduleUpdate, { passive: true });
      window.addEventListener('resize', scheduleUpdate);
      update();
    })();
  </script>

</body>
</html>
